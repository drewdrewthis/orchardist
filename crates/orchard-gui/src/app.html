<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
    <title>Orchard</title>
    <script>
      // Pre-Svelte theme hydration so the first paint matches the persisted
      // preference (avoids a dark→light flash on reload when light is saved).
      try {
        var t = localStorage.getItem("orchard:ui:theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
        var h = localStorage.getItem("orchard:ui:accent-hue");
        if (h) document.documentElement.style.setProperty("--accent-hue", h);
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
