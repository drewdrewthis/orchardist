fragment PaneCard on TmuxPane {
	paneId
	title
	currentCommand
	currentPid
	window {
		id
		index
		name
		active
		session {
			id
			name
			attached
			activeAttached
			lastActivityAt
		}
	}
	claudeInstance {
		...SessionCard
	}
	process {
		pid
		cwd
		# `command` is the basename ps reports (e.g. "claude", "zsh"). More
		# reliable than `TmuxPane.currentCommand` which on macOS can be the
		# `claude --version` string instead of the executable name.
		command
		worktree {
			...WorktreeEnrichment
		}
	}
}
