fragment PaneCard on TmuxPane {
	paneId
	title
	currentCommand
	currentPid
	window {
		id
		index
		name
		active
		session {
			id
			name
			attached
			activeAttached
			lastActivityAt
		}
	}
	claudeInstance {
		...SessionCard
	}
	process {
		pid
		cwd
		worktree {
			...WorktreeEnrichment
		}
	}
}
