query OpenPanel($paneIds: [String!]) {
	tmuxPanes(filter: { paneIdIn: $paneIds }) {
		...PaneCard
	}
	claudeInstances {
		...SessionCard
	}
	conversations {
		sessionUuid
		lastSeenAt
		firstSeenAt
		messageCount
		open
		recap
		cwd
		jsonlPath
		agentName
		customTitle
	}
	workView {
		repos {
			id
			slug
			worktrees {
				...WorktreeEnrichment
			}
		}
	}
}
