fragment WorktreeEnrichment on Worktree {
	id
	path
	branch
	host
	repo
	# NO `pr {…}` here — fetching it triggers PullRequestsForRepo (one
	# REST list call per repo, ~12s on a fleet with many open PRs in
	# langwatch/langwatch). Lens queries need to be FAST. PR fields are
	# fetched separately by the panel via WorktreePR when a row is
	# actively viewed.
	issue {
		number
		state
		title
	}
}
