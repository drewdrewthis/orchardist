name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Note: orchard-gui (Tauri) requires GTK/WebKit system libs on Linux that
  # we don't install in CI to keep it cheap. Drew validates the GUI crate
  # locally on macOS via `cargo tauri dev`. CI only validates the orchard
  # CLI/TUI crate.
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check -p orchard --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test -p orchard

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy -p orchard --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  schema:
    name: Schema Up-To-Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Regenerate schema
        run: cargo build -p orchard
      - name: Verify schema.json matches committed version
        run: |
          if ! git diff --exit-code -- crates/orchard/schema.json; then
            echo "::error::schema.json is out of sync. Run 'cargo build -p orchard' and commit the updated crates/orchard/schema.json."
            exit 1
          fi

  bats:
    name: Bats (scripts + plugin)
    runs-on: ubuntu-latest
    # Runs every bats suite: the conversation-contracts plugin (pure bash +
    # markdown, exercises hook/fold scripts) and the scripts/**/*.bats suite
    # (L2-envelope assertions on the contracts-adjacent shell scripts under
    # scripts/gh, scripts/git, scripts/host-services, scripts/tmux).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run plugin bats
        run: bats -r plugins/conversation-contracts
      - name: Run scripts bats
        run: bats -r scripts

  gui-stop-bleed:
    name: GUI stop-bleed (no new <style> blocks)
    runs-on: ubuntu-latest
    # Per ADR-020, new orchard-gui components must use Tailwind utilities,
    # not scoped <style> blocks. This guard enforces the rule on PRs.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # need history to diff against base
      - name: Run stop-bleed check
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          git fetch origin "$BASE_REF" --depth=1 || true
          crates/orchard-gui/scripts/stop-bleed-check.sh "origin/$BASE_REF"
