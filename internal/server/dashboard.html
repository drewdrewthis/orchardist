<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>orchard — what's being worked on</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --fg: #e6e9ef; --muted: #8b93a7; --accent: #6ea8fe;
    --ok: #3fb950; --warn: #d29922; --bad: #f85149; --info: #58a6ff; --dead: #6e7681;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 12px; }
  #conn { margin-left: auto; font-size: 12px; color: var(--muted); }
  #conn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--dead); margin-right: 6px; vertical-align: middle; }
  #conn.live .dot { background: var(--ok); }
  #banner {
    display: none; padding: 10px 20px; background: #3d1518; color: #ffdce0;
    border-bottom: 1px solid var(--bad); font-weight: 600;
  }
  #banner.show { display: block; }
  main { padding: 18px 20px 60px; max-width: 1200px; margin: 0 auto; }
  section { margin-bottom: 28px; }
  .sec-head { display: flex; align-items: baseline; gap: 10px; margin: 0 0 10px; }
  .sec-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0; }
  .sec-head .count { font-size: 12px; color: var(--muted); }
  .sec-head .stale { font-size: 12px; color: var(--warn); margin-left: auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; overflow: hidden;
  }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .meta { color: var(--muted); font-size: 12px; margin-top: 4px; word-break: break-word; }
  .card a { color: var(--accent); text-decoration: none; }
  .card a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px;
    font-weight: 700; text-transform: lowercase; letter-spacing: .02em; white-space: nowrap;
    border: 1px solid transparent;
  }
  .badge.working { background: rgba(63,185,80,.16); color: #56d364; border-color: rgba(63,185,80,.4); }
  .badge.idle    { background: rgba(88,166,255,.14); color: #79c0ff; border-color: rgba(88,166,255,.35); }
  .badge.input   { background: rgba(210,153,34,.16); color: #e3b341; border-color: rgba(210,153,34,.4); }
  .badge.stalled { background: rgba(219,109,40,.16); color: #ec8e2c; border-color: rgba(219,109,40,.4); }
  .badge.dead    { background: rgba(110,118,129,.16); color: #a0a7b4; border-color: rgba(110,118,129,.4); }
  .badge.no_claude { background: rgba(110,118,129,.10); color: var(--muted); border-color: var(--border); }
  .badge.unknown { background: rgba(110,118,129,.10); color: var(--muted); border-color: var(--border); }
  .pill {
    display: inline-block; padding: 0 7px; border-radius: 4px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); color: var(--muted); background: var(--panel2);
  }
  .pill.ci-SUCCESS { color: #56d364; border-color: rgba(63,185,80,.4); }
  .pill.ci-FAILURE { color: #f85149; border-color: rgba(248,81,73,.4); }
  .pill.ci-PENDING { color: #e3b341; border-color: rgba(210,153,34,.4); }
  .pill.ci-UNKNOWN { color: var(--muted); }
  .pill.st-OPEN { color: #56d364; border-color: rgba(63,185,80,.4); }
  .pill.st-MERGED { color: #bc8cff; border-color: rgba(163,113,247,.4); }
  .pill.st-CLOSED { color: #f85149; border-color: rgba(248,81,73,.4); }
  .empty { color: var(--muted); font-style: italic; padding: 6px 2px; }
  .spacer { flex: 1; }
</style>
</head>
<body>
<div id="orchard-dashboard">
  <header>
    <h1>🌳 orchard</h1>
    <span class="sub">what's being worked on — live daemon state</span>
    <span id="conn"><span class="dot"></span><span id="conn-text">connecting…</span></span>
  </header>

  <div id="banner">⚠ daemon unreachable — retrying…</div>

  <main>
    <section id="sessions-section">
      <div class="sec-head">
        <h2>Sessions</h2>
        <span class="count" id="sessions-count"></span>
      </div>
      <div class="cards" id="sessions"></div>
    </section>

    <section id="lanes-section">
      <div class="sec-head">
        <h2>Lanes</h2>
        <span class="count" id="lanes-count"></span>
        <span class="stale" id="lanes-stale"></span>
      </div>
      <div class="cards" id="lanes"></div>
    </section>

    <section id="prs-section">
      <div class="sec-head">
        <h2>In-flight PRs</h2>
        <span class="count" id="prs-count"></span>
        <span class="stale" id="prs-stale"></span>
      </div>
      <div class="cards" id="prs"></div>
    </section>
  </main>
</div>

<script>
(function () {
  "use strict";
  var FAST_MS = 3000, SLOW_MS = 25000;
  var STATES = ["working", "idle", "input", "stalled", "dead", "no_claude"];
  var lastSlowOk = null;      // Date of last successful slow fetch
  var slowFailing = false;    // last slow poll errored

  function $(id) { return document.getElementById(id); }
  function esc(s) {
    s = (s === null || s === undefined) ? "" : String(s);
    return s.replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }
  function stateClass(s) { return STATES.indexOf(s) >= 0 ? s : "unknown"; }
  function hhmm(d) {
    function p(n) { return (n < 10 ? "0" : "") + n; }
    return p(d.getHours()) + ":" + p(d.getMinutes());
  }
  function fmtWhen(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    if (isNaN(d.getTime())) return esc(iso);
    var secs = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
    var rel;
    if (secs < 60) rel = secs + "s ago";
    else if (secs < 3600) rel = Math.floor(secs / 60) + "m ago";
    else if (secs < 86400) rel = Math.floor(secs / 3600) + "h ago";
    else rel = Math.floor(secs / 86400) + "d ago";
    function p(n) { return (n < 10 ? "0" : "") + n; }
    return p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds()) + " (" + rel + ")";
  }

  // POST a GraphQL query same-origin. Rejects on network error OR GraphQL errors.
  function gql(query, variables) {
    return fetch("/graphql", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: query, variables: variables || {} })
    }).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(function (j) {
      // GraphQL returns partial data alongside field-level errors (e.g. a
      // flaky gh issue/PR resolution: "#718 is a pull request"). Use the
      // data when present — errored fields come back null and the renderers
      // tolerate nulls. Only a missing data payload (or the network failure
      // handled above) is treated as a real, banner-worthy error.
      if (j && j.data) return j.data;
      var msg = (j && j.errors && j.errors[0] && j.errors[0].message) || "graphql error";
      throw new Error(msg);
    });
  }

  function setConn(live) {
    var c = $("conn");
    c.className = live ? "live" : "";
    $("conn-text").textContent = live ? "live · " + hhmm(new Date()) : "reconnecting…";
    $("banner").className = live ? "" : "show";
  }

  // ---- Sessions (fast) ----
  var SESSIONS_Q =
    "{ claudeInstances { id sessionUuid state lastActivityAt model" +
    " worktree { branch repo } conversation { customTitle agentName } } }";

  function dedupeSessions(rows) {
    // Live data returns duplicate rows per sessionUuid + null sessionUuid/model.
    // Key by sessionUuid when present, else fall back to id so distinct
    // null-uuid rows are never collapsed together. On collision keep the
    // "richest" row (most populated fields, then most recent activity).
    var by = {};
    function score(r) {
      var s = 0;
      if (r.model) s++;
      if (r.worktree) s++;
      if (r.conversation && (r.conversation.agentName || r.conversation.customTitle)) s++;
      if (r.lastActivityAt) s++;
      return s;
    }
    (rows || []).forEach(function (r) {
      var key = r.sessionUuid ? "u:" + r.sessionUuid : "id:" + r.id;
      var cur = by[key];
      if (!cur) { by[key] = r; return; }
      var sc = score(r), scc = score(cur);
      if (sc > scc) { by[key] = r; return; }
      if (sc === scc && r.lastActivityAt && cur.lastActivityAt &&
          new Date(r.lastActivityAt) > new Date(cur.lastActivityAt)) by[key] = r;
    });
    return Object.keys(by).map(function (k) { return by[k]; });
  }

  function sessionTitle(r) {
    var c = r.conversation || {};
    return c.agentName || c.customTitle ||
      (r.worktree && r.worktree.branch) || r.sessionUuid || r.id || "session";
  }

  function renderSessions(rows) {
    var list = dedupeSessions(rows);
    // Sort: working first, then by most-recent activity.
    list.sort(function (a, b) {
      var aw = a.state === "working" ? 0 : 1, bw = b.state === "working" ? 0 : 1;
      if (aw !== bw) return aw - bw;
      return (new Date(b.lastActivityAt || 0)) - (new Date(a.lastActivityAt || 0));
    });
    var box = $("sessions");
    box.innerHTML = "";
    $("sessions-count").textContent = list.length ? "(" + list.length + ")" : "";
    if (!list.length) {
      box.appendChild(el("div", "empty", "no active sessions"));
      return;
    }
    list.forEach(function (r) {
      var card = el("div", "card");
      var top = el("div", "row");
      top.appendChild(el("span", "badge " + stateClass(r.state), esc(r.state || "unknown")));
      top.appendChild(el("span", "title", esc(sessionTitle(r))));
      card.appendChild(top);
      var wt = r.worktree || {};
      var bits = [
        "model " + (r.model ? esc(r.model) : "—"),
        (wt.repo ? esc(wt.repo) : "—") + (wt.branch ? " · " + esc(wt.branch) : ""),
        "active " + fmtWhen(r.lastActivityAt)
      ];
      card.appendChild(el("div", "meta", bits.join(" &nbsp;·&nbsp; ")));
      box.appendChild(card);
    });
  }

  function pollSessions() {
    return gql(SESSIONS_Q).then(function (data) {
      setConn(true);
      renderSessions((data && data.claudeInstances) || []);
    }).catch(function (e) {
      setConn(false); // daemon unreachable / query failed -> banner
    });
  }

  // ---- Lanes + PRs (slow) ----
  var WORKVIEW_Q =
    "{ workView { repos { slug worktrees { id path branch bare repo" +
    " pr { number state draft url statusCheckRollup reviewDecision title }" +
    " issue { number title state url } claudeInstances { sessionUuid state } ahead behind } }" +
    " meta { provider lastSuccessfulFetchAt failureReason } } }";
  var PRS_Q =
    "query($repo:String!){ openPullRequests(repo:$repo){ number title state draft url statusCheckRollup reviewDecision } }";

  function isMainWorktree(wt) {
    if (/:main$/.test(wt.id || "")) return true;
    var b = wt.branch || "";
    return b === "main" || b === "master";
  }

  function prCell(pr) {
    if (!pr) return "";
    var parts = [];
    parts.push('<a href="' + esc(pr.url) + '" target="_blank" rel="noopener">#' + esc(pr.number) + "</a>");
    parts.push('<span class="pill st-' + esc(pr.state) + '">' + esc(pr.state) + "</span>");
    parts.push('<span class="pill ci-' + esc(pr.statusCheckRollup) + '">CI ' + esc(pr.statusCheckRollup) + "</span>");
    if (pr.reviewDecision) parts.push('<span class="pill">' + esc(pr.reviewDecision) + "</span>");
    return parts.join(" ");
  }

  function setStale(elId, stale, reason) {
    var e = $(elId);
    if (!stale) { e.textContent = ""; e.title = ""; return; }
    var when = lastSlowOk ? hhmm(lastSlowOk) : "never";
    e.textContent = "stale — last ok " + when;
    e.title = reason || "";
  }

  function renderLanes(repos) {
    var box = $("lanes");
    box.innerHTML = "";
    var lanes = [];
    (repos || []).forEach(function (repo) {
      (repo.worktrees || []).forEach(function (wt) {
        if (wt.bare || isMainWorktree(wt)) return;
        lanes.push({ repo: repo.slug, wt: wt });
      });
    });
    $("lanes-count").textContent = lanes.length ? "(" + lanes.length + ")" : "";
    if (!lanes.length) { box.appendChild(el("div", "empty", "no active lanes")); return; }
    lanes.forEach(function (L) {
      var wt = L.wt;
      var card = el("div", "card");
      var top = el("div", "row");
      top.appendChild(el("span", "title", esc(wt.branch || "(detached)")));
      top.appendChild(el("span", "spacer"));
      (wt.claudeInstances || []).forEach(function (ci) {
        top.appendChild(el("span", "badge " + stateClass(ci.state), esc(ci.state)));
      });
      card.appendChild(top);
      var meta = [];
      meta.push(esc(L.repo));
      if (wt.issue) meta.push('issue #' + esc(wt.issue.number));
      if (typeof wt.ahead === "number" || typeof wt.behind === "number")
        meta.push("↑" + (wt.ahead || 0) + " ↓" + (wt.behind || 0));
      card.appendChild(el("div", "meta", meta.join(" &nbsp;·&nbsp; ")));
      if (wt.pr) card.appendChild(el("div", "meta", prCell(wt.pr)));
      box.appendChild(card);
    });
  }

  function renderPRs(groups) {
    var box = $("prs");
    box.innerHTML = "";
    var total = 0;
    groups.forEach(function (g) { total += g.prs.length; });
    $("prs-count").textContent = total ? "(" + total + ")" : "";
    if (!total) { box.appendChild(el("div", "empty", "no open PRs")); return; }
    groups.forEach(function (g) {
      g.prs.forEach(function (pr) {
        var card = el("div", "card");
        var top = el("div", "row");
        top.appendChild(el("span", "title", esc(pr.title || "(untitled)")));
        card.appendChild(top);
        card.appendChild(el("div", "meta", esc(g.repo) + " &nbsp;·&nbsp; " + prCell(pr)));
        box.appendChild(card);
      });
    });
  }

  function pollSlow() {
    return gql(WORKVIEW_Q).then(function (data) {
      var wv = (data && data.workView) || { repos: [], meta: {} };
      renderLanes(wv.repos);
      // meta.failureReason present => provider degraded; still render last-good.
      var metaBad = wv.meta && wv.meta.failureReason;
      // Fetch open PRs per configured repo (best-effort, in parallel).
      // openPullRequests requires an owner/name repo; Repo.slug is a short
      // local name (e.g. "cr-ship"), so derive the owner/name set from
      // worktree.repo (the origin-remote slug) instead.
      var repoSet = {};
      (wv.repos || []).forEach(function (repo) {
        (repo.worktrees || []).forEach(function (wt) {
          if (wt.repo) repoSet[wt.repo] = true;
        });
      });
      var jobs = Object.keys(repoSet).map(function (rn) {
        return gql(PRS_Q, { repo: rn })
          .then(function (d) { return { repo: rn, prs: (d && d.openPullRequests) || [] }; })
          .catch(function () { return { repo: rn, prs: [] }; });
      });
      return Promise.all(jobs).then(function (groups) {
        renderPRs(groups);
        lastSlowOk = new Date();
        slowFailing = false;
        setStale("lanes-stale", !!metaBad, metaBad || "");
        setStale("prs-stale", false);
      });
    }).catch(function (e) {
      // Slow provider slow/failed: keep last-good data, show stale (do not blank).
      slowFailing = true;
      setStale("lanes-stale", true, String(e && e.message || e));
      setStale("prs-stale", true, String(e && e.message || e));
    });
  }

  // ---- kick off segmented polling ----
  pollSessions();
  pollSlow();
  setInterval(pollSessions, FAST_MS);
  setInterval(pollSlow, SLOW_MS);
})();
</script>
</body>
</html>
