# gqlgen configuration â€” schema-first, daemon/ module layout.
# See https://gqlgen.com/config/
#
# Schema is composed from the root partial (Node, scalars, empty
# Query/Mutation/Subscription) plus per-domain partials discovered via glob.
# Generated types and the executable schema land in daemon/graphql/.
# Resolver stubs land in daemon/resolvers/ â€” filled in per domain and left
# alone on subsequent runs.

schema:
  - daemon/schema.graphql        # root: Node, Time, JSON, empty Query/Mutation/Subscription
  - daemon/*/schema.graphql      # per-domain partials (alphabetical glob)

exec:
  filename: daemon/graphql/generated.go
  package: graphql

model:
  filename: daemon/graphql/models_gen.go
  package: graphql

resolver:
  layout: follow-schema
  dir: daemon/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# Optimised types for our schema. Health.uptimeS is non-negative and fits
# easily into int64; map GraphQL Int to Go int64 to keep parity with the
# stdlib JSON encoder.
#
# Per-field overrides force gqlgen to emit a resolver method for fields
# whose value comes from a provider rather than a struct field.
models:
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int64
  Repo:
    fields:
      worktrees:
        resolver: true
  Worktree:
    fields:
      host:
        resolver: true
      repo:
        resolver: true
      pr:
        resolver: true
      issue:
        resolver: true
      processes:
        resolver: true
      tmuxPanes:
        resolver: true
      tmuxSession:
        resolver: true
      claudeInstances:
        resolver: true

  # Host.processes accepts a filter argument, so route it through a custom
  # resolver instead of struct-field auto-binding. The resolver consults the
  # ps provider and applies the filter at the resolver layer (ADR-011 Â§6).
  # Host.version is a resolver field: local host returns DaemonVersion; peer
  # hosts return the version fetched from the peer's probe (cached, not
  # fetched on every GraphQL request).
  Host:
    fields:
      processes:
        resolver: true
      peers:
        resolver: true
      version:
        resolver: true

  # Process is materialised by the ps provider's resolver layer. `args` and
  # `cwd` are slow-path fields per ADR-011 Â§5.1 â€” they need their own
  # resolvers so we can opt-in to the extra ps / lsof shellouts only when
  # the field is actually selected.
  Process:
    fields:
      host:
        resolver: true
      args:
        resolver: true
      cwd:
        resolver: true
      worktree:
        resolver: true
      claudeInstance:
        resolver: true

  # ClaudeInstance graph joins â€” daemon-side cwdâ†’worktree match and
  # sessionUuidâ†’Conversation lookup so clients don't repeat the work.
  # Field name on Resolver was renamed `ClaudeInstance` â†’
  # `ClaudeInstanceProvider` so gqlgen's auto-generated `ClaudeInstance()`
  # resolver-getter method does not collide with the provider field.
  ClaudeInstance:
    fields:
      worktree:
        resolver: true
      conversation:
        resolver: true

  # Tmux fields that require provider lookups (relationship traversals,
  # on-demand content captures) are resolved by per-field resolvers, not
  # by reading the struct. The lightweight identifier-only fields stay on
  # the generated struct so callers paying for `id` alone don't pay for a
  # provider hit.
  TmuxServer:
    fields:
      sessions:
        resolver: true
      clients:
        resolver: true
      pid:
        resolver: true
      alive:
        resolver: true
  TmuxSession:
    fields:
      server:
        resolver: true
      attached:
        resolver: true
      activeAttached:
        resolver: true
      attachedClients:
        resolver: true
      lastActivityAt:
        resolver: true
      windows:
        resolver: true
      currentWindow:
        resolver: true
      createdAt:
        resolver: true
  TmuxWindow:
    fields:
      session:
        resolver: true
      panes:
        resolver: true
      currentPane:
        resolver: true
      active:
        resolver: true
      name:
        resolver: true
  TmuxPane:
    fields:
      window:
        resolver: true
      title:
        resolver: true
      currentCommand:
        resolver: true
      currentPid:
        resolver: true
      width:
        resolver: true
      height:
        resolver: true
      dead:
        resolver: true
      watchingClients:
        resolver: true
      process:
        resolver: true
      claudeInstance:
        resolver: true
      content:
        resolver: true
      contentRange:
        resolver: true
      contentFull:
        resolver: true
  TmuxClient:
    fields:
      server:
        resolver: true
      session:
        resolver: true
      tty:
        resolver: true
      hostname:
        resolver: true
      termName:
        resolver: true
      attachedAt:
        resolver: true
      lastActivityAt:
        resolver: true
      readonly:
        resolver: true
      currentWindow:
        resolver: true
      currentPane:
        resolver: true

  # Time scalar maps to Go's time.Time so resolvers return native values
  # and the wire format is RFC 3339Nano (gqlgen's default Time marshaller).
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time

  # PullRequest enrichment fields are populated lazily by EnrichPullRequest
  # (a GraphQL round-trip). Marking them resolver: true lets the five
  # field resolvers share one EnrichPullRequest call per request via the
  # provider's 60s cache.
  PullRequest:
    fields:
      mergeable:
        resolver: true
      mergeStateStatus:
        resolver: true
      reviewDecision:
        resolver: true
      statusCheckRollup:
        resolver: true
      labels:
        resolver: true

  # Issue.labels is populated by the gh provider's REST fetch (single +
  # list) and projected to the GraphQL Label type by a custom resolver
  # so the orchard phase-label filter and color/description mapping live
  # in one place â€” same shape as PullRequest.labels.
  #
  # Dependency fields (blockedByIssues, blockingIssues, subIssues,
  # parentIssue â€” #563) hit GitHub's GraphQL with the preview-gated
  # `issue_types,sub_issues` features. EnrichIssueDependencies fetches
  # all four edges in one round-trip and caches them with a short TTL;
  # each field resolver projects one edge.
  Issue:
    fields:
      labels:
        resolver: true
      blockedByIssues:
        resolver: true
      blockingIssues:
        resolver: true
      subIssues:
        resolver: true
      parentIssue:
        resolver: true

  # JSON scalar binds to gqlgen's Any marshaller, which round-trips any
  # JSON-shaped value (`map[string]any`, `[]any`, primitives) verbatim.
  # Used by Query.gh to forward GitHub GraphQL responses without imposing
  # an orchard-side schema (issue #418).
  JSON:
    model:
      - github.com/99designs/gqlgen/graphql.Any
