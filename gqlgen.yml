# gqlgen configuration — schema-first.
# See https://gqlgen.com/config/
#
# schema.graphql at repo root is the source of truth. Generated types and
# the executable schema land in internal/server/graphql/. Resolvers are
# stubbed out into internal/server/resolvers/ on first generation; we then
# fill them in by hand and gqlgen leaves them alone on subsequent runs.

schema:
  - schema.graphql

exec:
  filename: internal/server/graphql/generated.go
  package: graphql

model:
  filename: internal/server/graphql/models_gen.go
  package: graphql

resolver:
  layout: follow-schema
  dir: internal/server/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# Optimised types for our schema. Health.uptimeS is non-negative and fits
# easily into int64; map GraphQL Int to Go int64 to keep parity with the
# stdlib JSON encoder.
#
# Per-field overrides force gqlgen to emit a resolver method for fields
# whose value comes from a provider rather than a struct field.
models:
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int64
  Project:
    fields:
      worktrees:
        resolver: true
  Worktree:
    fields:
      host:
        resolver: true
      repo:
        resolver: true
      pr:
        resolver: true
      issue:
        resolver: true
      processes:
        resolver: true
      tmuxPanes:
        resolver: true
      tmuxSession:
        resolver: true

  # Host.processes accepts a filter argument, so route it through a custom
  # resolver instead of struct-field auto-binding. The resolver consults the
  # ps provider and applies the filter at the resolver layer (ADR-011 §6).
  Host:
    fields:
      processes:
        resolver: true
      peers:
        resolver: true

  # Process is materialised by the ps provider's resolver layer. `args` and
  # `cwd` are slow-path fields per ADR-011 §5.1 — they need their own
  # resolvers so we can opt-in to the extra ps / lsof shellouts only when
  # the field is actually selected.
  Process:
    fields:
      host:
        resolver: true
      args:
        resolver: true
      cwd:
        resolver: true
      worktree:
        resolver: true
      claudeInstance:
        resolver: true

  # Tmux fields that require provider lookups (relationship traversals,
  # on-demand content captures) are resolved by per-field resolvers, not
  # by reading the struct. The lightweight identifier-only fields stay on
  # the generated struct so callers paying for `id` alone don't pay for a
  # provider hit.
  TmuxServer:
    fields:
      sessions:
        resolver: true
      clients:
        resolver: true
      pid:
        resolver: true
      alive:
        resolver: true
  TmuxSession:
    fields:
      server:
        resolver: true
      attached:
        resolver: true
      activeAttached:
        resolver: true
      attachedClients:
        resolver: true
      lastActivityAt:
        resolver: true
      windows:
        resolver: true
      currentWindow:
        resolver: true
      createdAt:
        resolver: true
  TmuxWindow:
    fields:
      session:
        resolver: true
      panes:
        resolver: true
      currentPane:
        resolver: true
      active:
        resolver: true
      name:
        resolver: true
  TmuxPane:
    fields:
      window:
        resolver: true
      title:
        resolver: true
      currentCommand:
        resolver: true
      currentPid:
        resolver: true
      width:
        resolver: true
      height:
        resolver: true
      dead:
        resolver: true
      watchingClients:
        resolver: true
      process:
        resolver: true
      claudeInstance:
        resolver: true
      content:
        resolver: true
      contentRange:
        resolver: true
      contentFull:
        resolver: true
  TmuxClient:
    fields:
      server:
        resolver: true
      session:
        resolver: true
      tty:
        resolver: true
      hostname:
        resolver: true
      termName:
        resolver: true
      attachedAt:
        resolver: true
      lastActivityAt:
        resolver: true
      readonly:
        resolver: true
      currentWindow:
        resolver: true
      currentPane:
        resolver: true

  # Time scalar maps to Go's time.Time so resolvers return native values
  # and the wire format is RFC 3339Nano (gqlgen's default Time marshaller).
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time

  # PullRequest enrichment fields are populated lazily by EnrichPullRequest
  # (a GraphQL round-trip). Marking them resolver: true lets the five
  # field resolvers share one EnrichPullRequest call per request via the
  # provider's 60s cache.
  PullRequest:
    fields:
      mergeable:
        resolver: true
      mergeStateStatus:
        resolver: true
      reviewDecision:
        resolver: true
      statusCheckRollup:
        resolver: true
      labels:
        resolver: true

  # JSON scalar binds to gqlgen's Any marshaller, which round-trips any
  # JSON-shaped value (`map[string]any`, `[]any`, primitives) verbatim.
  # Used by Query.gh to forward GitHub GraphQL responses without imposing
  # an orchard-side schema (issue #418).
  JSON:
    model:
      - github.com/99designs/gqlgen/graphql.Any
