# Canonical GraphQL schema for the orchard daemon.
#
# Source of truth — gqlgen reads this and codegens types + resolver stubs
# under internal/server/graphql/. The Rust TUI codegens its client from
# the same file. Schema-first is intentional; see ADR-011.
#
# Workstream A scope: only the `health` field. Real node types come in
# later workstreams.
#
# Workstream B-host: Host node + ResourceLoad. Identity surfaces machine
# id, hostname, OS, kernel; resourceLoad surfaces live CPU/mem/disk/load
# averages. peers ships empty until Workstream F federates orchard
# instances together. Other providers add their own back-edges.
#
# Workstream B-config: Project node — projects declared in the orchard
# config. Read-only; mutations go through `orchard config add-repo`.
#
# Workstream B-git: Worktree node + Project.worktrees back-edge. Process
# is forward-declared so Worktree.processes can reference it; ws-b-ps
# fills in the rest.

"""
A node in the orchard graph. Every node has a globally-unique id so
clients can fetch it via Query.node(id) regardless of which concrete
type it is.
"""
interface Node {
  "Globally-unique id (e.g. \"Host:<machineId>\")."
  id: ID!
}

# Process is forward-declared here so Worktree.processes can reference
# it; the ps provider in ws-b-ps fills in the rest of the type.
# Until that lands, Worktree.processes resolves to `[]`.
type Process implements Node {
  "Stable id formatted as `<host>:<pid>`."
  id: ID!
}

type Query {
  "Liveness probe — returns daemon health and uptime."
  health: Health!

  "The local machine running this daemon. Identity is one-shot at boot; resource load refreshes every 5s."
  host: Host!

  "All hosts known to this daemon. v1: only the local host. Workstream F adds federated peers."
  hosts: [Host!]!

  "All projects declared in ~/.config/orchard/config.json. Read-only — projects are added with `orchard config add-repo`."
  projects: [Project!]!
}

type Health {
  "Daemon health status — 'ok' when serving."
  status: String!

  "Uptime in seconds since daemon started."
  uptimeS: Int!
}

"""
A machine that orchard reflects. Identity is the OS-issued machine id
(/etc/machine-id on Linux, IOPlatformUUID on macOS). Resource load
samples on a 5s TTL.
"""
type Host implements Node {
  "Stable orchard id — \"Host:<machineId>\"."
  id: ID!

  "OS-issued machine id. Linux: /etc/machine-id. macOS: IOPlatformUUID."
  machineId: String!

  "Hostname as reported by the OS at boot."
  hostname: String!

  "Operating system family — 'darwin', 'linux', etc."
  os: String!

  "Kernel version string (e.g. 'Darwin 25.4.0', 'Linux 6.5.0'). Nullable when unavailable."
  kernel: String

  "Reachable network address. v1: null for the local host; Workstream F populates for peers."
  address: String

  "True when the daemon last heard from this host. v1: always true for local host."
  reachable: Boolean!

  "Live CPU, memory, disk, and load averages. Polled every 5s; null briefly at cold boot before the first sample lands."
  resourceLoad: ResourceLoad

  "RFC 3339 timestamp of the last successful read. v1: time of the last load sample for the local host."
  lastSeenAt: String!

  "Peer hosts this daemon federates with. v1: always empty; Workstream F populates."
  peers: [Host!]!
}

"""
A snapshot of a host's resource utilisation. Percentages are 0..100.
Load averages are the kernel-reported 1/5/15-minute moving averages.
"""
type ResourceLoad {
  "Aggregate CPU usage 0..100."
  cpuPercent: Float!

  "Used memory as a percentage of total physical memory, 0..100."
  memPercent: Float!

  "Used disk on the root filesystem as a percentage, 0..100."
  diskPercent: Float!

  "1-minute load average."
  loadAvg1m: Float!

  "5-minute load average."
  loadAvg5m: Float!

  "15-minute load average."
  loadAvg15m: Float!
}

"A project (git repo) registered in the orchard config. The config file is the source of truth; the daemon reflects it via fsnotify."
type Project implements Node {
  "Stable identifier — slug of `name`, falling back to a short hash of `directory`. Survives re-registration."
  id: ID!

  "Absolute filesystem path to the project's working tree."
  directory: String!

  "Human-readable label. Defaults to the basename of `directory` when not specified in the config."
  name: String!

  "Worktrees discovered for this project — the project's main checkout plus everything under `.git/worktrees/`."
  worktrees: [Worktree!]!
}

"A git worktree — either the project's main checkout or one created with `git worktree add`. See ADR-011 §5.1."
type Worktree implements Node {
  "Stable identifier formatted as `<project_id>:<worktree_name>`. The main checkout uses the worktree name `main`."
  id: ID!

  "Absolute filesystem path to the worktree."
  path: String!

  "Branch the worktree currently has checked out. Empty string for detached HEAD or bare worktrees."
  branch: String!

  "Resolved 40-character SHA the worktree's HEAD points at. Empty string when HEAD cannot be resolved (e.g. an unborn branch)."
  head: String!

  "True when HEAD references a deleted branch or otherwise fails to resolve to a commit. Bare worktrees still appear in the list — they just have no live branch."
  bare: Boolean!

  "Processes whose cwd lies under `path`. Resolved by the ps provider (ws-b-ps); returns `[]` until that provider lands."
  processes: [Process!]!
}
